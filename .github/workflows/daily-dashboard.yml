name: Daily loot.tn promo dashboard update

on:
  schedule:
    # 07:00 UTC every day = 08:00 in Tunisia (UTC+1)
    - cron: "0 7 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run daily research script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-dashboard.mjs

      - name: Commit updated data
        run: |
          git config user.name "loot-dashboard-bot"
          git config user.email "actions@github.com"
          git add data/dashboard.json
          git diff --quiet --cached || git commit -m "Daily dashboard update $(date -u +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo (latest, post-commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
